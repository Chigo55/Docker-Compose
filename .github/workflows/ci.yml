name: CI

# 스크립트/설정 회귀를 push·PR 마다 자동으로 잡습니다(ROADMAP P3-9).
# windows-latest + Windows PowerShell 5.1 에서 내부 개발 루프 check.ps1 -Test 의
# "Docker 불필요" 부분만 돌립니다: 린트(PSScriptAnalyzer) + 규약 점검(doctor) +
# Pester 단위 테스트.
#   · 실제 운영 환경이 PowerShell 5.1 이므로 러너도 5.1(shell: powershell)로 맞춥니다.
#     UTF-8 BOM 규약이 존재하는 이유가 5.1 의 CP949 오독이라, 검증도 5.1 에서 해야 합니다.
#   · Docker/실값 .env 가 필요한 백업·복원·compose 렌더링은 CI 대상이 아닙니다.
#     doctor 는 Docker 가 없으면 그 단계를 경고만 남기고 통과하도록 이미 설계돼 있습니다.

on:
  push:
    branches: [main, master]
  pull_request:

# 같은 ref 에 새 커밋이 오면 진행 중이던 실행은 취소합니다(러너 시간 절약).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: lint + doctor + tests (PowerShell 5.1)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Create compose/.env for CI
        shell: powershell
        # NOTE: this run block must stay ASCII-only. GitHub writes it to a BOM-less
        #       temp .ps1, and Windows PowerShell 5.1 mis-decodes non-ASCII (e.g. Korean)
        #       as ANSI, which breaks parsing. Comments/strings here are English on purpose.
        run: |
          # Real .env is gitignored, so it is absent on the runner. Copy the example
          # and fill only the missing SA password with a policy-compliant dummy
          # (8+ chars, 3+ character classes). This .env is used only by doctor's
          # convention checks; nothing connects with it (no Docker start in CI).
          $src = 'compose/.env.example'
          $dst = Join-Path $PWD 'compose/.env'
          $lines = Get-Content $src -Encoding UTF8 | ForEach-Object {
              if ($_ -match '^MSSQL_SA_PASSWORD=') { 'MSSQL_SA_PASSWORD=CiTest_Pass123' } else { $_ }
          }
          # docker reads this file, so write UTF-8 without BOM.
          [System.IO.File]::WriteAllLines($dst, $lines, (New-Object System.Text.UTF8Encoding($false)))
          Write-Host "Created $dst (dummy SA password for CI)"

      - name: Run internal dev loop (check.ps1 -Test -Install)
        shell: powershell
        # NOTE: ASCII-only run block (same reason as the step above).
        run: |
          # Windows PowerShell 5.1 does not enable TLS 1.2 by default, so PSGallery
          # installs can fail. Enable it in the same process before -Install fetches modules.
          [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
          # Make console output UTF-8 so check.ps1's Korean output renders in the Actions log.
          [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
          # Lint + doctor + Pester. Missing dev modules (PSScriptAnalyzer/Pester 5+) come via -Install.
          # If it fails, check.ps1 exits 1 and this step fails with that exit code.
          .\scripts\check.ps1 -Test -Install
