# ═══════════════════════════════════════════════════════════════════════════
#  compose.yml  —  컨테이너의 "구조"만 정의합니다. (설정값은 전부 .env 에 있음)
# ═══════════════════════════════════════════════════════════════════════════
#
#  [처음 보는 문법 빠른 안내]
#   ${VAR}           : 같은 폴더의 .env 에서 VAR 값을 가져와 끼워 넣습니다.
#   ${VAR:-기본값}   : VAR 가 비어 있으면 "기본값"을 대신 씁니다.
#   ${VAR:?메시지}   : VAR 가 비어 있으면 "메시지"를 내며 실행을 멈춥니다. (필수 값 표시)
#   $$              : 글자 그대로의 달러 기호($) 하나. (compose 가 변수로 오해하지 않게 이스케이프)
#
#   x-이름:          : "x-" 로 시작하는 항목은 서비스가 아니라 "재사용용 조각(템플릿)"입니다.
#                      compose 는 이것을 컨테이너로 만들지 않고, 아래에서 갖다 쓰기만 합니다.
#   &이름            : 이 조각에 "앵커(이름표)"를 붙입니다.       (예: &base)
#   *이름            : 앵커로 이름표 붙인 조각을 그대로 가져옵니다. (예: *base)
#   <<: *이름        : 그 조각의 항목들을 지금 위치에 "펼쳐 넣기(병합)"합니다.
#
#   → 즉, 공통 설정을 한 번만 적고(&base 등) 각 서비스에서 재사용(<<: *base)합니다.
#     여러 인스턴스가 거의 같은 설정을 공유하므로, 이렇게 하면 중복이 크게 줄어듭니다.
#
#  [예시 인스턴스] 아래는 2019 3개 + 2022 5개의 "예시"입니다. 서비스 키(db2019a 등)와
#                 .env 의 접두사(DB2019A 등)는 반드시 짝이 맞아야 합니다.
# ═══════════════════════════════════════════════════════════════════════════

# 프로젝트 이름. .env 의 COMPOSE_PROJECT_NAME 이 없으면 에러(:? )를 냅니다.
name: ${COMPOSE_PROJECT_NAME:?}


# ─── 공통 조각(템플릿) 정의 ──────────────────────────────────────────────────
# 모든 컨테이너에 공통으로 들어갈 환경변수 묶음.
x-env: &env
  ACCEPT_EULA: ${ACCEPT_EULA:-Y}                                                  # SQL Server 사용 약관 동의 (Y)
  MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD:?.env 에 MSSQL_SA_PASSWORD 가 필요합니다}  # sa 계정 비밀번호 (필수)
  MSSQL_PID: ${MSSQL_PID:-Developer}                                             # 에디션 (Developer/Express 등)
  TZ: ${TZ:-Asia/Seoul}                                                          # 컨테이너 시간대
  # 아래 두 줄은 "선택 사항"입니다. 쓰려면 .env 의 대응 줄과 함께 이 줄의 # 도 지우세요.
  # (한쪽만 풀면 빈 값이 넘어가 컨테이너가 기동에 실패할 수 있습니다.)
  # MSSQL_MEMORY_LIMIT_MB: ${MSSQL_MEMORY_LIMIT_MB}
  # MSSQL_AGENT_ENABLED: ${MSSQL_AGENT_ENABLED}

# 컨테이너가 "정상 동작 중"인지 주기적으로 점검하는 설정(값 부분만 공통).
x-healthcheck: &healthcheck
  interval: ${HEALTHCHECK_INTERVAL:-30s}          # 몇 초마다 점검할지
  timeout: ${HEALTHCHECK_TIMEOUT:-5s}             # 한 번 점검의 제한 시간
  retries: ${HEALTHCHECK_RETRIES:-10}             # 몇 번 실패하면 unhealthy 로 볼지
  start_period: ${HEALTHCHECK_START_PERIOD:-60s}  # 기동 직후 이 시간 동안은 실패를 봐줌

# 버전(2019/2022)과 상관없이 모든 서비스가 공유하는 뼈대.
x-base: &base
  restart: ${RESTART_POLICY:-always}              # 컨테이너가 죽으면 자동 재시작
  stop_grace_period: ${STOP_GRACE_PERIOD:-60s}    # 정지 시 정상 종료를 기다리는 시간
  environment: *env                               # 위에서 만든 공통 환경변수(&env) 사용
  networks: [mssql]                               # 아래 정의한 mssql 네트워크에 연결
  logging:                                        # 로그 파일이 무한정 커지지 않게 제한
    driver: json-file
    options:
      max-size: ${LOG_MAX_SIZE:-10m}              # 로그 파일 한 개 최대 크기
      max-file: ${LOG_MAX_FILE:-3}                # 로그 파일 최대 개수

# SQL Server 2019 전용 조각. (base 를 물려받고, 이미지/헬스체크만 2019 것으로)
x-mssql-2019: &mssql2019
  <<: *base                                       # base 의 모든 설정을 그대로 가져옴
  image: ${MSSQL_REPO}:${MSSQL_2019_TAG}          # 사용할 도커 이미지
  healthcheck:
    <<: *healthcheck                              # 공통 헬스체크 값 + 아래 test 명령
    # sqlcmd 로 'SELECT 1' 을 실행해 응답하면 정상으로 봅니다. ($$ 는 글자 그대로의 $)
    test: ["CMD-SHELL", "${MSSQL_2019_SQLCMD} -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -Q 'SELECT 1'"]

# SQL Server 2022 전용 조각. (2022 는 sqlcmd 경로가 다릅니다 — .env 참고)
x-mssql-2022: &mssql2022
  <<: *base
  image: ${MSSQL_REPO}:${MSSQL_2022_TAG}
  healthcheck:
    <<: *healthcheck
    test: ["CMD-SHELL", "${MSSQL_2022_SQLCMD} -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -Q 'SELECT 1'"]


# ─── 서비스(실제 컨테이너들) ─────────────────────────────────────────────────
# 각 서비스는 위 조각을 <<: 로 가져오고, 자기만의 이름/포트/데이터 폴더만 지정합니다.
#   container_name : 컨테이너 이름
#   hostname       : 컨테이너 내부에서 서로 부를 때 쓰는 이름
#   ports          : "호스트포트:컨테이너포트" — 호스트의 포트로 접속하면 내부 1433 으로 연결
#   volumes        : "호스트폴더:컨테이너폴더" — 데이터를 호스트에 저장해 컨테이너가 사라져도 보존
#                    기본은 data 만 보존합니다. errorlog(/var/opt/mssql/log)·secrets 도 호스트에
#                    남기려면 각 서비스 volumes 의 log/secrets 주석 두 줄과 .env 의
#                    MOUNT_LOG_SECRETS=true 를 함께 켜세요(start.ps1 이 해당 폴더를 만듭니다).
services:

  # ═══ SQL Server 2019 (예시 3개) ═══
  db2019a:
    <<: *mssql2019
    container_name: ${DB2019A_NAME}
    hostname: ${DB2019A_NAME}
    ports: ["${DB2019A_PORT}:${MSSQL_PORT:-1433}"]
    volumes:
      - "${DATA_ROOT}/${DB2019A_DIR}/data:/var/opt/mssql/data"
      # 선택(errorlog·secrets 보존): 아래 2줄 + .env 의 MOUNT_LOG_SECRETS=true 를 함께 켜세요.
      # - "${DATA_ROOT}/${DB2019A_DIR}/log:/var/opt/mssql/log"
      # - "${DATA_ROOT}/${DB2019A_DIR}/secrets:/var/opt/mssql/secrets"

  db2019b:
    <<: *mssql2019
    container_name: ${DB2019B_NAME}
    hostname: ${DB2019B_NAME}
    ports: ["${DB2019B_PORT}:${MSSQL_PORT:-1433}"]
    volumes:
      - "${DATA_ROOT}/${DB2019B_DIR}/data:/var/opt/mssql/data"
      # 선택(errorlog·secrets 보존): 아래 2줄 + .env 의 MOUNT_LOG_SECRETS=true 를 함께 켜세요.
      # - "${DATA_ROOT}/${DB2019B_DIR}/log:/var/opt/mssql/log"
      # - "${DATA_ROOT}/${DB2019B_DIR}/secrets:/var/opt/mssql/secrets"

  db2019c:
    <<: *mssql2019
    container_name: ${DB2019C_NAME}
    hostname: ${DB2019C_NAME}
    ports: ["${DB2019C_PORT}:${MSSQL_PORT:-1433}"]
    volumes:
      - "${DATA_ROOT}/${DB2019C_DIR}/data:/var/opt/mssql/data"
      # 선택(errorlog·secrets 보존): 아래 2줄 + .env 의 MOUNT_LOG_SECRETS=true 를 함께 켜세요.
      # - "${DATA_ROOT}/${DB2019C_DIR}/log:/var/opt/mssql/log"
      # - "${DATA_ROOT}/${DB2019C_DIR}/secrets:/var/opt/mssql/secrets"

  # ═══ SQL Server 2022 (예시 5개) ═══
  db2022a:
    <<: *mssql2022
    container_name: ${DB2022A_NAME}
    hostname: ${DB2022A_NAME}
    ports: ["${DB2022A_PORT}:${MSSQL_PORT:-1433}"]
    volumes:
      - "${DATA_ROOT}/${DB2022A_DIR}/data:/var/opt/mssql/data"
      # 선택(errorlog·secrets 보존): 아래 2줄 + .env 의 MOUNT_LOG_SECRETS=true 를 함께 켜세요.
      # - "${DATA_ROOT}/${DB2022A_DIR}/log:/var/opt/mssql/log"
      # - "${DATA_ROOT}/${DB2022A_DIR}/secrets:/var/opt/mssql/secrets"

  db2022b:
    <<: *mssql2022
    container_name: ${DB2022B_NAME}
    hostname: ${DB2022B_NAME}
    ports: ["${DB2022B_PORT}:${MSSQL_PORT:-1433}"]
    volumes:
      - "${DATA_ROOT}/${DB2022B_DIR}/data:/var/opt/mssql/data"
      # 선택(errorlog·secrets 보존): 아래 2줄 + .env 의 MOUNT_LOG_SECRETS=true 를 함께 켜세요.
      # - "${DATA_ROOT}/${DB2022B_DIR}/log:/var/opt/mssql/log"
      # - "${DATA_ROOT}/${DB2022B_DIR}/secrets:/var/opt/mssql/secrets"

  db2022c:
    <<: *mssql2022
    container_name: ${DB2022C_NAME}
    hostname: ${DB2022C_NAME}
    ports: ["${DB2022C_PORT}:${MSSQL_PORT:-1433}"]
    volumes:
      - "${DATA_ROOT}/${DB2022C_DIR}/data:/var/opt/mssql/data"
      # 선택(errorlog·secrets 보존): 아래 2줄 + .env 의 MOUNT_LOG_SECRETS=true 를 함께 켜세요.
      # - "${DATA_ROOT}/${DB2022C_DIR}/log:/var/opt/mssql/log"
      # - "${DATA_ROOT}/${DB2022C_DIR}/secrets:/var/opt/mssql/secrets"

  db2022d:
    <<: *mssql2022
    container_name: ${DB2022D_NAME}
    hostname: ${DB2022D_NAME}
    ports: ["${DB2022D_PORT}:${MSSQL_PORT:-1433}"]
    volumes:
      - "${DATA_ROOT}/${DB2022D_DIR}/data:/var/opt/mssql/data"
      # 선택(errorlog·secrets 보존): 아래 2줄 + .env 의 MOUNT_LOG_SECRETS=true 를 함께 켜세요.
      # - "${DATA_ROOT}/${DB2022D_DIR}/log:/var/opt/mssql/log"
      # - "${DATA_ROOT}/${DB2022D_DIR}/secrets:/var/opt/mssql/secrets"

  db2022e:
    <<: *mssql2022
    container_name: ${DB2022E_NAME}
    hostname: ${DB2022E_NAME}
    ports: ["${DB2022E_PORT}:${MSSQL_PORT:-1433}"]
    volumes:
      - "${DATA_ROOT}/${DB2022E_DIR}/data:/var/opt/mssql/data"
      # 선택(errorlog·secrets 보존): 아래 2줄 + .env 의 MOUNT_LOG_SECRETS=true 를 함께 켜세요.
      # - "${DATA_ROOT}/${DB2022E_DIR}/log:/var/opt/mssql/log"
      # - "${DATA_ROOT}/${DB2022E_DIR}/secrets:/var/opt/mssql/secrets"


# ─── 네트워크 ────────────────────────────────────────────────────────────────
# 모든 컨테이너를 같은 가상 네트워크에 묶습니다. 컨테이너끼리는 hostname 으로 서로 접근합니다.
networks:
  mssql:
    name: ${NETWORK_NAME:-mssql-farm-net}
    driver: ${NETWORK_DRIVER:-bridge}
